<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 70" width="300" height="70" role="img" aria-label="Luna Clara Designs">
  <defs>
    <linearGradient id="lcw-gold" x1="10%" y1="10%" x2="90%" y2="90%">
      <stop offset="0%"   stop-color="#F5E49A"/>
      <stop offset="30%"  stop-color="#D4A83A"/>
      <stop offset="55%"  stop-color="#EDD070"/>
      <stop offset="80%"  stop-color="#B8831A"/>
      <stop offset="100%" stop-color="#E8C050"/>
    </linearGradient>
  </defs>

  <!-- Crescent moon -->
  <path fill-rule="evenodd" fill="url(#lcw-gold)"
    d="M30 11 a24 24 0 1 1 0 48 a24 24 0 1 1 0 -48 Z
       M38 14 a20 20 0 1 0 0 42 a20 20 0 1 0 0 -42 Z"/>

  <!-- Starburst nestled in the crescent opening -->
  <path fill="url(#lcw-gold)"
    d="M45 12 l2.4 10.6 10.6 2.4 -10.6 2.4 -2.4 10.6 -2.4 -10.6 -10.6 -2.4 10.6 -2.4 Z"/>

  <!-- Small sparkle -->
  <path fill="url(#lcw-gold)"
    d="M62 16 l1 4 4 1 -4 1 -1 4 -1 -4 -4 -1 4 -1 Z"/>

  <!-- Wordmark -->
  <text x="80" y="36"
    font-family="Palatino Linotype, Book Antiqua, Palatino, Georgia, serif"
    font-size="27" font-weight="700" letter-spacing="3.5"
    fill="url(#lcw-gold)">LUNA CLARA</text>

  <!-- Tagline rule + text -->
  <line x1="80" y1="48" x2="116" y2="48" stroke="url(#lcw-gold)" stroke-width="0.8"/>
  <text x="121" y="51"
    font-family="Palatino Linotype, Book Antiqua, Palatino, Georgia, serif"
    font-size="8.5" font-weight="400" letter-spacing="3"
    fill="url(#lcw-gold)">DESIGNED IN USA</text>
</svg>
