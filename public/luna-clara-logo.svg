<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <rect width="400" height="500" fill="#ffffff"/>

  <defs>
    <linearGradient id="gld" x1="10%" y1="10%" x2="90%" y2="90%">
      <stop offset="0%"   stop-color="#F5E49A"/>
      <stop offset="30%"  stop-color="#D4A83A"/>
      <stop offset="55%"  stop-color="#EDD070"/>
      <stop offset="80%"  stop-color="#B8831A"/>
      <stop offset="100%" stop-color="#E8C050"/>
    </linearGradient>
  </defs>

  <!--
    Moon + starburst group rotated 22° CW around composition center (200,150).
    Crescent: outer circle center(210,155) R=97, inner circle center(155,155) r=84.
    The evenodd rule subtracts the inner circle → thick C-shaped crescent opening left.
    Starburst placed at inner-circle center (155,155) — appears in concave opening.
  -->
  <g transform="rotate(22, 200, 150)">

    <!-- Crescent moon (evenodd compound path) -->
    <path fill-rule="evenodd" fill="url(#gld)"
      d="M 210 58
         A 97 97 0 1 1 210 252
         A 97 97 0 1 1 210 58 Z
         M 155 71
         A 84 84 0 1 1 155 239
         A 84 84 0 1 1 155 71 Z"/>

    <!--
      8-pointed starburst at (155,155).
      Cardinal arms (top/right/bottom/left) radius = 66.
      Diagonal arms (NE/SE/SW/NW) radius = 30.
      Inner notch radius ≈ 7 — produces sharp needle-like points.
    -->
    <polygon transform="translate(155,155)" fill="url(#gld)"
      points="
        0,-66   1.5,-7
        21,-21  7,-1.5
        66,0    7,1.5
        21,21   1.5,7
        0,66   -1.5,7
        -21,21 -7,1.5
        -66,0  -7,-1.5
        -21,-21 -1.5,-7
      "/>

    <!-- Small 4-pointed star, upper-right of composition -->
    <polygon transform="translate(302,102)" fill="url(#gld)"
      points="0,-14  1,-1.5  14,0  1,1.5  0,14  -1,1.5  -14,0  -1,-1.5"/>

  </g>

  <!-- LUNA CLARA -->
  <text
    x="200" y="314"
    font-family="Palatino Linotype, Book Antiqua, Palatino, Georgia, serif"
    font-size="46" font-weight="700" letter-spacing="9"
    text-anchor="middle"
    fill="url(#gld)">LUNA CLARA</text>

  <!-- Divider: line · diamond · line -->
  <line x1="64"  y1="334" x2="166" y2="334" stroke="url(#gld)" stroke-width="1.2"/>
  <polygon points="200,326  209,334  200,342  191,334" fill="url(#gld)"/>
  <line x1="234" y1="334" x2="336" y2="334" stroke="url(#gld)" stroke-width="1.2"/>

  <!-- PREMIUM GEM -->
  <text
    x="200" y="364"
    font-family="Palatino Linotype, Book Antiqua, Palatino, Georgia, serif"
    font-size="17" font-weight="400" letter-spacing="9"
    text-anchor="middle"
    fill="url(#gld)">PREMIUM GEM</text>

  <!-- DESIGNED IN USA -->
  <text
    x="200" y="387"
    font-family="Palatino Linotype, Book Antiqua, Palatino, Georgia, serif"
    font-size="13" font-weight="400" letter-spacing="7"
    text-anchor="middle"
    fill="url(#gld)">DESIGNED IN USA</text>

</svg>
